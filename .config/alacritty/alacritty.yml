env:
  TERM: alacritty

scrolling:
  history: 1000
  multiplier: 3

font:
  normal:
    family: CodeNewRoman
  bold:
    family: CodeNewRoman
  italic:
    family: CodeNewRoman
  size: 13.0

# Pnevma
colors:
  primary:
    foreground: "#d0d0d0"
    background: "#1c1c1c"
  cursor:
    cursor: "#d0d0d0"
    text: "#1c1c1c"
  normal:
    black: "#1c1c1c"
    red: "#a36666"
    green: "#90a57d"
    yellow: "#d7af87"
    blue: "#7fa5bd"
    purple: "#c79ec4"
    cyan: "#8adbb4"
    white: "#d0d0d0"
  bright:
    black: "#4a4845"
    red: "#d78787"
    green: "#afbea2"
    yellow: "#e4c9af"
    blue: "#a1bdce"
    purple: "#d7beda"
    cyan: "#b1e7dd"
    white: "#efefef"

cursor:
  style:
    shape: Block

key_bindings:
  - { key: Return, mods: Control|Shift, action: SpawnNewInstance }
